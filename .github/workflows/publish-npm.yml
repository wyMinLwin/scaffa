name: Publish to NPM

on:
  push:
    branches: [main]
    paths:
      - 'packages/create-scaffa/package.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/create-scaffa
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Check version
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view create-scaffa version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "npm=$NPM_VERSION" >> $GITHUB_OUTPUT
          if [ "$LOCAL_VERSION" = "$NPM_VERSION" ]; then
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "Version $LOCAL_VERSION already published, skipping..."
          else
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "Publishing $LOCAL_VERSION (npm has $NPM_VERSION)"
          fi

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        run: npm publish --provenance --access public

      - name: Skip publish
        if: steps.check.outputs.should_publish == 'false'
        run: echo "Skipped - version ${{ steps.check.outputs.local }} already exists on npm"
